<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" aria-label="NLC structure illustration">
  <defs>
    <radialGradient id="bgCircle" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#000008"/>
    </radialGradient>
    <radialGradient id="coronaGrad" cx="38%" cy="32%">
      <stop offset="0%" stop-color="#5b9bd5"/>
      <stop offset="55%" stop-color="#2a6ab5"/>
      <stop offset="100%" stop-color="#0d3a7a"/>
    </radialGradient>
    <radialGradient id="orangeGrad" cx="36%" cy="30%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="30%" stop-color="#f5921e"/>
      <stop offset="75%" stop-color="#d4600a"/>
      <stop offset="100%" stop-color="#8b3500"/>
    </radialGradient>
    <radialGradient id="greenGrad" cx="36%" cy="30%">
      <stop offset="0%" stop-color="#b4f06a"/>
      <stop offset="40%" stop-color="#5cb82a"/>
      <stop offset="100%" stop-color="#1e6600"/>
    </radialGradient>
    <radialGradient id="headGrad" cx="36%" cy="30%">
      <stop offset="0%" stop-color="#a8deff"/>
      <stop offset="50%" stop-color="#4da6e8"/>
      <stop offset="100%" stop-color="#1a5faa"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <circle cx="200" cy="200" r="198" fill="url(#bgCircle)"/>

  <!-- Blue surfactant corona ring -->
  <circle cx="200" cy="200" r="148" fill="url(#coronaGrad)"/>

  <!-- Orange lipid matrix -->
  <circle cx="200" cy="200" r="108" fill="url(#orangeGrad)"/>

  <!-- Green inner solid lipid / drug sphere -->
  <circle cx="200" cy="200" r="52" fill="url(#greenGrad)" filter="url(#glow)"/>

